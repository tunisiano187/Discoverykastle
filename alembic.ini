[alembic]
# Path to migration scripts
script_location = alembic

# Database URL — overridden at runtime from DKASTLE_DATABASE_URL env var
# (see alembic/env.py which reads server.config.settings.database_url)
sqlalchemy.url = postgresql+asyncpg://dkastle:dkastle@localhost:5432/discoverykastle

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
